<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站直播监控</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #2a2a4a; }
.header h1 { font-size: 20px; color: #fb7299; }
.header .room-info { font-size: 14px; color: #888; }
.status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; margin-left: auto; }
.status .dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.connected { background: #00c853; box-shadow: 0 0 6px #00c853; }
.dot.disconnected { background: #ff5252; }
.dot.connecting { background: #ffc107; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 16px 24px; }
.stat-card { background: #1a1a2e; border-radius: 10px; padding: 14px 16px; border: 1px solid #2a2a4a; }
.stat-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-card .value { font-size: 22px; font-weight: 700; }
.stat-card.danmaku .value { color: #64b5f6; }
.stat-card.gift .value { color: #ffb74d; }
.stat-card.sc .value { color: #ef5350; }
.stat-card.guard .value { color: #ab47bc; }
.stat-card.popularity .value { color: #4dd0e1; }
.stat-card.sc-total .value { color: #ff7043; }

.tabs { display: flex; gap: 0; padding: 0 24px; border-bottom: 1px solid #2a2a4a; background: #12121f; }
.tab { padding: 10px 20px; cursor: pointer; font-size: 14px; color: #888; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #bbb; }
.tab.active { color: #fb7299; border-bottom-color: #fb7299; }

.events-container { padding: 8px 24px; overflow-y: auto; max-height: calc(100vh - 260px); }
.event { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; margin: 4px 0; border-radius: 8px; background: #1a1a2e; border: 1px solid #222240; font-size: 14px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

.event .time { color: #555; font-size: 12px; white-space: nowrap; min-width: 58px; padding-top: 2px; }
.event .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge.danmaku { background: #1a3a5c; color: #64b5f6; }
.badge.gift { background: #3e2a0a; color: #ffb74d; }
.badge.superchat { background: #4a1515; color: #ef5350; }
.badge.guard { background: #2e1542; color: #ce93d8; }
.badge.enter { background: #1a2e1a; color: #81c784; }
.badge.like { background: #3e2a2a; color: #e57373; }
.badge.info { background: #2a2a3e; color: #90a4ae; }

.event .avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
.event .user { color: #fb7299; font-weight: 500; white-space: nowrap; }
.event .content { color: #ccc; flex: 1; word-break: break-all; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.event .content .emoticon { height: 32px; width: auto; vertical-align: middle; border-radius: 4px; }
.event .content .emoticon-inline { height: 20px; width: auto; vertical-align: text-bottom; margin: 0 1px; }
.event.superchat { border-left: 3px solid #ef5350; background: #1f1520; }
.event.guard { border-left: 3px solid #ab47bc; background: #1a1528; }
.event.gift .price-tag { color: #ffb74d; font-size: 12px; margin-left: 6px; }
.event.superchat .price-tag { color: #ef5350; font-weight: 700; font-size: 13px; margin-left: 6px; }

.empty { text-align: center; padding: 60px; color: #555; font-size: 16px; }

.controls { display: flex; align-items: center; gap: 12px; padding: 8px 24px; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #888; }
.controls input[type="checkbox"] { accent-color: #fb7299; }
.time-range { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.time-range input { background: #1a1a2e; border: 1px solid #2a2a4a; color: #ccc; padding: 5px 10px; border-radius: 6px; font-size: 12px; width: 150px; cursor: pointer; }
.time-range input:focus { border-color: #fb7299; outline: none; }
.time-range .btn { border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.time-range .btn-primary { background: #fb7299; color: #fff; }
.time-range .btn-primary:hover { background: #e0607e; }
.time-range .preset { background: #1a1a2e; border: 1px solid #2a2a4a; color: #888; }
.time-range .preset:hover { border-color: #fb7299; color: #fb7299; }
.time-range .preset.active { background: #fb729922; border-color: #fb7299; color: #fb7299; }
.time-range .sep { color: #555; font-size: 12px; }
.gen-img-btn { cursor: pointer; margin-left: 4px; padding: 2px 8px; font-size: 11px; flex-shrink: 0; background: rgba(255,255,255,0.15); border-radius: 4px; color: #ddd; transition: background 0.2s; font-family: -apple-system, "PingFang SC", sans-serif; }
.gen-img-btn:hover { background: rgba(255,255,255,0.3); }
.gift-btns { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }

.img-modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 200; justify-content: center; align-items: center; }
.img-modal-overlay.show { display: flex; }
.img-modal { background: #1a1a2e; border-radius: 16px; padding: 24px; border: 1px solid #2a2a4a; max-height: 90vh; overflow-y: auto; text-align: center; }
.img-modal h2 { color: #fb7299; font-size: 16px; margin-bottom: 12px; }
.img-modal canvas { border-radius: 8px; max-width: 100%; }
.img-modal .gif-preview { max-width: 100%; border-radius: 8px; }
.img-modal .actions { margin-top: 12px; display: flex; gap: 8px; justify-content: center; }
.img-modal .actions button { padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
.img-modal .dl-btn { background: #fb7299; color: #fff; }
.img-modal .dl-btn:hover { background: #e0607e; }
.img-modal .cl-btn { background: transparent; border: 1px solid #444 !important; color: #888; }
.img-modal .cl-btn:hover { border-color: #888 !important; color: #ccc; }

.flatpickr-calendar { background: #1a1a2e !important; border: 1px solid #2a2a4a !important; }
.flatpickr-calendar .flatpickr-day.selected { background: #fb7299 !important; border-color: #fb7299 !important; }

.login-btn { background: #fb7299; color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.2s; }
.login-btn:hover { background: #e0607e; }
.login-btn.logged-in { background: #2a8a4a; cursor: pointer; }
.login-btn.logged-in:hover { background: #c0392b; }
.room-switch select { background: #1a1a2e; border: 1px solid #2a2a4a; color: #ccc; padding: 5px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.room-switch select:focus { border-color: #fb7299; outline: none; }

.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #1a1a2e; border-radius: 16px; padding: 32px; text-align: center; border: 1px solid #2a2a4a; min-width: 320px; }
.modal h2 { color: #fb7299; margin-bottom: 8px; font-size: 18px; }
.modal p { color: #888; font-size: 13px; margin-bottom: 16px; }
.modal .qr-container { background: #fff; border-radius: 12px; padding: 16px; display: inline-block; margin-bottom: 16px; }
.modal .qr-container img { display: block; width: 200px; height: 200px; }
.modal .qr-status { color: #4dd0e1; font-size: 14px; min-height: 20px; }
.modal .qr-status.error { color: #ef5350; }
.modal .qr-status.success { color: #00c853; }
.modal .close-btn { background: none; border: 1px solid #444; color: #888; padding: 6px 20px; border-radius: 6px; cursor: pointer; margin-top: 12px; font-size: 13px; }
.modal .close-btn:hover { border-color: #888; color: #ccc; }
.cmd-item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; margin-bottom: 8px; }
.cmd-item .cmd-info { flex: 1; }
.cmd-item .cmd-name { font-size: 15px; font-weight: 600; color: #e0e0e0; }
.cmd-item .cmd-desc { font-size: 12px; color: #888; margin-top: 2px; }
.cmd-toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.cmd-toggle input { opacity: 0; width: 0; height: 0; }
.cmd-toggle .slider { position: absolute; inset: 0; background: #444; border-radius: 12px; cursor: pointer; transition: 0.2s; }
.cmd-toggle .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
.cmd-toggle input:checked + .slider { background: #fb7299; }
.cmd-toggle input:checked + .slider::before { transform: translateX(20px); }
</style>
</head>
<body>

<div class="header">
  <h1>B站直播监控</h1>
  <span class="room-info" id="roomInfo">连接中...</span>
  <div class="room-switch">
    <select id="roomSelect" onchange="switchRoom()"></select>
  </div>
  <button class="login-btn" id="loginBtn" onclick="openLogin()">绑定机器人</button>
  <span class="status">
    <span class="dot connecting" id="statusDot"></span>
    <span id="statusText">连接中</span>
  </span>
  <span style="flex:1"></span>
  <button class="login-btn" id="logoutBtn" onclick="doLogout()" style="display:none;background:#555;margin-left:auto">退出登录</button>
</div>

<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h2>绑定机器人</h2>
    <p>使用哔哩哔哩 APP 扫描二维码</p>
    <div class="qr-container">
      <img id="qrImage" src="" alt="二维码">
    </div>
    <div class="qr-status" id="qrStatus">加载中...</div>
    <br>
    <button class="close-btn" onclick="closeLogin()">关闭</button>
  </div>
</div>

<div class="img-modal-overlay" id="imgModal">
  <div class="img-modal">
    <h2 id="imgTitle">今日礼物汇总</h2>
    <canvas id="giftCanvas"></canvas>
    <img id="gifPreview" class="gif-preview" style="display:none">
    <div class="actions">
      <button class="dl-btn" onclick="downloadGiftImage()">保存图片</button>
      <button class="cl-btn" onclick="document.getElementById('imgModal').classList.remove('show')">关闭</button>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stat-card popularity"><div class="label">人气值</div><div class="value" id="statPopularity">0</div></div>
  <div class="stat-card danmaku"><div class="label">弹幕</div><div class="value" id="statDanmaku">0</div></div>
  <div class="stat-card gift"><div class="label">礼物</div><div class="value" id="statGift">0</div></div>
  <div class="stat-card sc"><div class="label">醒目留言</div><div class="value" id="statSC">0</div></div>
  <div class="stat-card guard"><div class="label">上舰</div><div class="value" id="statGuard">0</div></div>
  <div class="stat-card sc-total"><div class="label">SC 总额</div><div class="value" id="statSCTotal">¥0</div></div>
</div>

<div class="tabs">
  <div class="tab active" data-type="all">全部</div>
  <div class="tab" data-type="danmaku">弹幕</div>
  <div class="tab" data-type="gift">礼物</div>
  <div class="tab" data-type="superchat">醒目留言</div>
  <div class="tab" data-type="guard">上舰</div>
  <div class="tab" data-type="enter">进场</div>
  <div class="tab" data-type="tools" onclick="showTools()">工具</div>
</div>

<div id="toolsPanel" style="display:none;padding:16px 24px;">
  <div id="commandsList"></div>
</div>

<div class="controls">
  <label><input type="checkbox" id="autoScroll" checked> 自动滚动</label>
  <label><input type="checkbox" id="showEnter"> 显示进场</label>
  <label><input type="checkbox" id="showLike"> 显示点赞</label>
  <div class="time-range">
    <button class="btn preset active" data-range="live" onclick="setPreset('live')">实时</button>
    <button class="btn preset" data-range="today" onclick="setPreset('today')">今日</button>
    <button class="btn preset" data-range="week" onclick="setPreset('week')">本周</button>
    <button class="btn preset" data-range="month" onclick="setPreset('month')">本月</button>
    <span class="sep">|</span>
    <input type="text" id="timeFrom" placeholder="开始时间">
    <span class="sep">~</span>
    <input type="text" id="timeTo" placeholder="结束时间">
    <button class="btn btn-primary" onclick="queryTimeRange()">查询</button>
  </div>
</div>

<div class="events-container" id="eventsContainer">
  <div class="empty" id="emptyMsg">等待接收消息...</div>
</div>

<script>
const MAX_EVENTS = 1000;
const eventsContainer = document.getElementById('eventsContainer');
const emptyMsg = document.getElementById('emptyMsg');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const autoScrollCb = document.getElementById('autoScroll');
const showEnterCb = document.getElementById('showEnter');
const showLikeCb = document.getElementById('showLike');

// Restore settings from localStorage
autoScrollCb.checked = localStorage.getItem('autoScroll') !== 'false';
showEnterCb.checked = localStorage.getItem('showEnter') === 'true';
showLikeCb.checked = localStorage.getItem('showLike') === 'true';

let activeTab = 'all';
let events = [];
let ws = null;
let statsInterval = null;

const badgeNames = { danmaku: '弹幕', gift: '礼物', superchat: 'SC', guard: '上舰', enter: '进场', like: '点赞', info: '信息' };

function formatTime(ts) {
  if (!ts) return '';
  // ts is UTC from server, convert to local
  const d = new Date(ts + 'Z');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function formatCoin(coin, coinType) {
  if (!coin) return '';
  if (coinType === 'gold') return '¥' + (coin / 1000).toFixed(1);
  return coin + '银瓜子';
}

function createEventEl(ev) {
  const div = document.createElement('div');
  div.className = `event ${ev.event_type}`;
  div.dataset.type = ev.event_type;

  let extra = ev.extra || {};
  if (typeof extra === 'string') { try { extra = JSON.parse(extra); } catch(e) { extra = {}; } }

  let priceHtml = '';
  if (ev.event_type === 'gift' && extra.total_coin) {
    priceHtml = `<span class="price-tag">${formatCoin(extra.total_coin, extra.coin_type)}</span>`;
  }
  if (ev.event_type === 'superchat' && extra.price) {
    priceHtml = `<span class="price-tag">¥${extra.price}</span>`;
  }
  if (ev.event_type === 'guard' && extra.guard_name) {
    priceHtml = `<span class="price-tag">${extra.guard_name}</span>`;
  }

  function fixUrl(url) { return url ? url.replace(/^http:\/\//, 'https://') : ''; }

  let contentHtml = '';
  const emoticon = extra.emoticon || {};
  const emots = extra.emots || {};
  if (emoticon.url) {
    // Large sticker emoticon
    contentHtml = `<img class="emoticon" referrerpolicy="no-referrer" src="${fixUrl(emoticon.url)}" alt="${escapeHtml(ev.content || '')}" title="${escapeHtml(ev.content || '')}">`;
  } else if (Object.keys(emots).length > 0) {
    // Inline small emojis: replace [xxx] with <img>
    let text = escapeHtml(ev.content || '');
    for (const [key, val] of Object.entries(emots)) {
      const escaped = escapeHtml(key);
      const img = `<img class="emoticon-inline" referrerpolicy="no-referrer" src="${fixUrl(val.url)}" alt="${escaped}" title="${escaped}">`;
      text = text.split(escaped).join(img);
    }
    contentHtml = text;
  } else {
    contentHtml = escapeHtml(ev.content || '');
  }

  const face = extra.face || '';
  const avatarHtml = face ? `<img class="avatar" referrerpolicy="no-referrer" src="${escapeHtml(face)}" alt="">` : '';

  let giftBtn = '';
  if (ev.event_type === 'gift' && ev.user_name) {
    const safeUser = escapeHtml(ev.user_name).replace(/'/g, "\\'");
    const giftId = extra.gift_id || 0;
    let btns = '';
    if (giftId) {
      btns += `<span class="gen-img-btn gen-gif-btn" data-gift-id="${giftId}" onclick="showGiftGif(${giftId},'${safeUser}','${escapeHtml(ev.content.split(' x')[0]).replace(/'/g, "\\'")}')" style="display:none">动态图片</span>`;
    }
    btns += `<span class="gen-img-btn" onclick="generateUserGiftImage('${safeUser}')">今日礼物</span>`;
    giftBtn = `<div class="gift-btns">${btns}</div>`;
  }

  div.innerHTML = `
    <span class="time">${formatTime(ev.timestamp)}</span>
    <span class="badge ${ev.event_type}">${badgeNames[ev.event_type] || ev.event_type}</span>
    ${avatarHtml}
    ${ev.user_name ? `<span class="user">${escapeHtml(ev.user_name)}</span>` : ''}
    <span class="content">${contentHtml}${priceHtml}</span>
    ${giftBtn}
  `;
  return div;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function shouldShow(ev) {
  if (activeTab !== 'all' && ev.event_type !== activeTab) return false;
  if (ev.event_type === 'enter' && !showEnterCb.checked) return false;
  if (ev.event_type === 'like' && !showLikeCb.checked) return false;
  return true;
}

function renderEvents() {
  eventsContainer.innerHTML = '';
  let shown = 0;
  for (const ev of events) {
    if (shouldShow(ev)) {
      eventsContainer.appendChild(createEventEl(ev));
      shown++;
    }
  }
  emptyMsg.style.display = shown === 0 ? '' : 'none';
  if (shown > 0 && emptyMsg.parentNode === eventsContainer) {
    eventsContainer.removeChild(emptyMsg);
  }
  if (autoScrollCb.checked) eventsContainer.scrollTop = eventsContainer.scrollHeight;
}

function addEvent(ev) {
  if (!isLiveMode) return;
  if (currentRoomId && ev.room_id && ev.room_id !== currentRoomId) return;
  events.push(ev);
  if (events.length > MAX_EVENTS) events.shift();

  if (!shouldShow(ev)) return;

  if (emptyMsg.parentNode === eventsContainer) eventsContainer.removeChild(emptyMsg);

  eventsContainer.appendChild(createEventEl(ev));

  while (eventsContainer.children.length > MAX_EVENTS) {
    eventsContainer.removeChild(eventsContainer.firstChild);
  }

  if (autoScrollCb.checked) eventsContainer.scrollTop = eventsContainer.scrollHeight;
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelector('.tab.active').classList.remove('active');
    tab.classList.add('active');
    activeTab = tab.dataset.type;
    const toolsPanel = document.getElementById('toolsPanel');
    const controls = document.querySelector('.controls');
    if (activeTab === 'tools') {
      eventsContainer.style.display = 'none';
      controls.style.display = 'none';
      toolsPanel.style.display = '';
      loadCommands();
    } else {
      eventsContainer.style.display = '';
      controls.style.display = '';
      toolsPanel.style.display = 'none';
      renderEvents();
    }
  });
});

autoScrollCb.addEventListener('change', () => { localStorage.setItem('autoScroll', autoScrollCb.checked); });
showEnterCb.addEventListener('change', () => { localStorage.setItem('showEnter', showEnterCb.checked); renderEvents(); });
showLikeCb.addEventListener('change', () => { localStorage.setItem('showLike', showLikeCb.checked); renderEvents(); });

// Stats
async function fetchStats() {
  try {
    const res = await fetch('/api/stats?' + (currentRoomId ? `room_id=${currentRoomId}` : ''));
    const s = await res.json();
    document.getElementById('statPopularity').textContent = s.popularity?.toLocaleString() || '0';
    document.getElementById('statDanmaku').textContent = s.danmaku?.toLocaleString() || '0';
    document.getElementById('statGift').textContent = s.gift?.toLocaleString() || '0';
    document.getElementById('statSC').textContent = s.superchat?.toLocaleString() || '0';
    document.getElementById('statGuard').textContent = s.guard?.toLocaleString() || '0';
    document.getElementById('statSCTotal').textContent = '¥' + (s.sc_total_price || 0);
  } catch(e) {}
}

let currentRoomId = null;

async function fetchRooms() {
  try {
    const res = await fetch('/api/rooms');
    const rooms = await res.json();
    const sel = document.getElementById('roomSelect');
    sel.innerHTML = rooms.map(r => `<option value="${r.room_id}">${r.room_id}</option>`).join('');
    // Default to first available room
    if (!currentRoomId || !rooms.find(r => r.room_id === currentRoomId)) {
      currentRoomId = rooms.length ? rooms[0].room_id : null;
    }
    sel.value = currentRoomId || '';
    document.getElementById('roomInfo').textContent = currentRoomId ? `房间号: ${currentRoomId}` : '';
    // Hide dropdown if only one room
    sel.style.display = rooms.length <= 1 ? 'none' : '';
  } catch(e) {}
}

function switchRoom() {
  const val = document.getElementById('roomSelect').value;
  currentRoomId = val ? parseInt(val) : null;
  document.getElementById('roomInfo').textContent = currentRoomId ? `房间号: ${currentRoomId}` : '';
  events = [];
  renderEvents();
  setPreset('live');
  fetchStats();
}

function roomParam() { return currentRoomId ? `&room_id=${currentRoomId}` : ''; }

// Load history
let isLiveMode = true;

async function loadHistory(timeFrom, timeTo) {
  try {
    let url = '/api/events?limit=2000' + roomParam();
    if (timeFrom) url += `&time_from=${encodeURIComponent(localToUTC(timeFrom))}`;
    if (timeTo) url += `&time_to=${encodeURIComponent(localToUTC(timeTo))}`;
    const res = await fetch(url);
    const data = await res.json();
    events = data.reverse().map(e => {
      if (typeof e.extra_json === 'string') {
        try { e.extra = JSON.parse(e.extra_json); } catch(_) { e.extra = {}; }
      }
      return e;
    });
    renderEvents();
  } catch(e) {}
}

const fpOpts = {
  enableTime: true, enableSeconds: true, time_24hr: true,
  dateFormat: 'Y-m-d H:i:S', locale: 'zh', theme: 'dark',
};
const fpFrom = flatpickr('#timeFrom', { ...fpOpts, defaultHour: 0, defaultMinute: 0, defaultSecond: 0 });
const fpTo = flatpickr('#timeTo', { ...fpOpts, defaultHour: 23, defaultMinute: 59, defaultSecond: 59 });

function pad(n) { return String(n).padStart(2, '0'); }
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtUTC(d) { return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`; }
function localToUTC(s) { return fmtUTC(new Date(s)); }

function setPreset(range) {
  document.querySelectorAll('.time-range .preset').forEach(b => b.classList.remove('active'));
  document.querySelector(`.preset[data-range="${range}"]`).classList.add('active');

  if (range === 'live') {
    const d = new Date(); d.setHours(d.getHours() - 1);
    const liveFrom = `${fmtDate(d)} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    fpFrom.clear(); fpTo.clear();
    isLiveMode = true;
    loadHistory(liveFrom);
    return;
  }

  const now = new Date();
  let from;
  if (range === 'today') {
    from = fmtDate(now) + ' 00:00:00';
  } else if (range === 'week') {
    const d = new Date(now); d.setDate(d.getDate() - d.getDay() + 1);
    from = fmtDate(d) + ' 00:00:00';
  } else if (range === 'month') {
    from = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01 00:00:00`;
  }
  const to = fmtDate(now) + ' 23:59:59';

  fpFrom.setDate(from, true);
  fpTo.setDate(to, true);
  isLiveMode = false;
  loadHistory(from, to);
}

function queryTimeRange() {
  const from = document.getElementById('timeFrom').value;
  const to = document.getElementById('timeTo').value;
  if (!from && !to) return;
  document.querySelectorAll('.time-range .preset').forEach(b => b.classList.remove('active'));
  isLiveMode = false;
  loadHistory(from, to);
}

function resetTimeRange() {
  setPreset('live');
}

// WebSocket
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    statusDot.className = 'dot connected';
    statusText.textContent = '已连接';
  };

  ws.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      addEvent(ev);
    } catch(err) {}
  };

  ws.onclose = () => {
    statusDot.className = 'dot disconnected';
    statusText.textContent = '已断开';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    statusDot.className = 'dot disconnected';
    statusText.textContent = '连接错误';
  };
}

// ── Login ──
const loginBtn = document.getElementById('loginBtn');
const loginModal = document.getElementById('loginModal');
const qrImage = document.getElementById('qrImage');
const qrStatus = document.getElementById('qrStatus');
let qrPollTimer = null;
let currentQrKey = null;

async function checkLoginStatus() {
  try {
    const res = await fetch('/api/bot/status');
    const d = await res.json();
    if (d.logged_in) {
      loginBtn.textContent = `机器人已绑定 (${d.uid})`;
      loginBtn.classList.add('logged-in');
    }
  } catch(e) {}
  document.getElementById('logoutBtn').style.display = '';
}

async function doLogout() {
  await fetch('/api/logout', {method: 'POST'});
  location.reload();
}

async function openLogin() {
  // 已绑定时点击解绑
  if (loginBtn.classList.contains('logged-in')) {
    if (!confirm('确定解绑机器人？解绑后将无法显示完整用户名和自动送礼')) return;
    await fetch('/api/bot/logout', {method: 'POST'});
    loginBtn.textContent = '绑定机器人';
    loginBtn.classList.remove('logged-in');
    return;
  }
  loginModal.classList.add('show');
  qrStatus.textContent = '加载中...';
  qrStatus.className = 'qr-status';
  qrImage.src = '';

  try {
    const res = await fetch('/api/bot/qrcode');
    const d = await res.json();
    if (d.error) { qrStatus.textContent = d.error; qrStatus.className = 'qr-status error'; return; }

    // Generate QR as image via inline canvas
    currentQrKey = d.qrcode_key;
    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(d.url)}`;
    qrStatus.textContent = '请使用哔哩哔哩 APP 扫码';

    // Start polling
    if (qrPollTimer) clearInterval(qrPollTimer);
    qrPollTimer = setInterval(pollLogin, 2000);
  } catch(e) {
    qrStatus.textContent = '获取二维码失败';
    qrStatus.className = 'qr-status error';
  }
}

async function pollLogin() {
  if (!currentQrKey) return;
  try {
    const res = await fetch(`/api/bot/poll?qrcode_key=${currentQrKey}`);
    const d = await res.json();
    if (d.code === 0) {
      qrStatus.textContent = `绑定成功! UID: ${d.uid}`;
      qrStatus.className = 'qr-status success';
      clearInterval(qrPollTimer);
      loginBtn.textContent = `机器人已绑定 (${d.uid})`;
      loginBtn.classList.add('logged-in');
      setTimeout(closeLogin, 1500);
    } else if (d.code === 86090) {
      qrStatus.textContent = '已扫码，请在手机上确认...';
    } else if (d.code === 86038) {
      qrStatus.textContent = '二维码已过期，请重新打开';
      qrStatus.className = 'qr-status error';
      clearInterval(qrPollTimer);
    }
  } catch(e) {}
}

function closeLogin() {
  loginModal.classList.remove('show');
  if (qrPollTimer) { clearInterval(qrPollTimer); qrPollTimer = null; }
  currentQrKey = null;
}

loginModal.addEventListener('click', (e) => { if (e.target === loginModal) closeLogin(); });
document.getElementById('imgModal').addEventListener('click', (e) => { if (e.target.id === 'imgModal') e.target.classList.remove('show'); });

// ── Gift Image Generation ──

async function loadImage(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.referrerPolicy = 'no-referrer';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src.replace(/^http:\/\//, 'https://');
  });
}

function formatGold(coin) {
  if (coin >= 10000000) return (coin / 10000000).toFixed(1) + '万元';
  if (coin >= 1000) return '¥' + (coin / 1000).toFixed(coin % 1000 === 0 ? 0 : 1);
  return coin + '金瓜子';
}

async function generateUserGiftImage(userName) {
  // 确保 Baloo 2 字体已加载
  try { await document.fonts.load('italic 800 30px "Baloo 2"'); } catch(e) {}
  const tz = new Date().getTimezoneOffset();
  const res = await fetch(`/api/gift-summary?user_name=${encodeURIComponent(userName)}&tz_offset=${tz}`);
  const data = await res.json();
  const u = (data.users || [])[0];
  if (!u) { alert('该用户今日暂无礼物记录'); return; }

  const gifts = Object.entries(u.gifts);
  const giftImgs = u.gift_imgs || {};
  const giftActions = u.gift_actions || {};
  const giftCoins = u.gift_coins || {};
  const canvas = document.getElementById('giftCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = 2;

  // ── 精确还原B站礼物通知卡片 ──
  const W = 480;
  const CARD_H = 74;
  const GAP = 6;
  const PAD_TOP = 6;
  const H = PAD_TOP + gifts.length * (CARD_H + GAP) - GAP + 6;

  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // Preload images
  const GUARD_FRAME_URLS = {
    1: '/static/guard_frame_1.png', // 总督
    2: '/static/guard_frame_2.png', // 提督
    3: '/static/guard_frame_3.png', // 舰长
  };
  const [avatar, guardFrame, ...giftImgObjs] = await Promise.all([
    loadImage(u.face || ''),
    u.guard_level > 0 ? loadImage(GUARD_FRAME_URLS[u.guard_level]) : Promise.resolve(null),
    ...gifts.map(([name]) => loadImage(giftImgs[name] || '')),
  ]);

  // 预加载4色卡片模板
  const CARD_TPL_URLS = {
    gold: '/static/card_tpl_gold.png',
    pink: '/static/card_tpl_pink.png',
    purple: '/static/card_tpl_purple.png',
    blue: '/static/card_tpl_blue.png',
  };
  const cardTpls = {};
  await Promise.all(Object.entries(CARD_TPL_URLS).map(async ([k, url]) => {
    cardTpls[k] = await loadImage(url);
  }));

  for (let i = 0; i < gifts.length; i++) {
    const [giftName, num] = gifts[i];
    const y = PAD_TOP + i * (CARD_H + GAP);

    // ── 1. 选模板并绘制 ──
    const thisGiftCoin = giftCoins[giftName] || 0;
    const thisYuan = thisGiftCoin / 1000;
    let tplKey = thisYuan >= 1000 ? 'gold' : thisYuan >= 500 ? 'pink' : thisYuan >= 100 ? 'purple' : 'blue';
    const tpl = cardTpls[tplKey];
    if (tpl) {
      ctx.drawImage(tpl, 0, y, W, CARD_H);
    }

    // ── 2. 头像 + 大航海头像框 ──
    const guardLevel = u.guard_level || 0;
    const acx = 36, acy = y + CARD_H / 2, ar = 28;
    const frameSize = 78;

    // 头像
    if (avatar) {
      ctx.save();
      ctx.beginPath(); ctx.arc(acx, acy, ar, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(avatar, acx - ar, acy - ar, ar * 2, ar * 2);
      ctx.restore();
    } else {
      ctx.fillStyle = '#2a4a7a';
      ctx.beginPath(); ctx.arc(acx, acy, ar, 0, Math.PI * 2); ctx.fill();
    }

    // B站官方头像框叠加
    if (guardFrame) {
      ctx.drawImage(guardFrame, acx - frameSize / 2, acy - frameSize / 2, frameSize, frameSize);
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(acx, acy, ar + 2, 0, Math.PI * 2); ctx.stroke();
    }

    // ── 统一阴影设置 ──
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
    ctx.shadowBlur = 3;

    // ── 3. 用户名 ──
    const tx = guardFrame ? acx + 46 : acx + ar + 14;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px -apple-system, "PingFang SC", sans-serif';
    ctx.fillText(u.user_name, tx, y + 29);

    // ── 4. "投喂 礼物名" 或 "盲盒名 爆出 礼物名" ──
    const action = giftActions[giftName] || '投喂';
    const isBlind = action.includes('爆出');
    let drawX = tx;
    if (isBlind) {
      // "心动盲盒" 金色
      const blindParts = action.split(' 爆出');
      ctx.fillStyle = '#ffe066';
      ctx.font = 'bold 15px -apple-system, "PingFang SC", sans-serif';
      ctx.fillText(blindParts[0], drawX, y + 52);
      drawX += ctx.measureText(blindParts[0]).width;
      // " 爆出 " 白色
      ctx.fillStyle = '#ffffff';
      ctx.font = '15px -apple-system, "PingFang SC", sans-serif';
      ctx.fillText(' 爆出 ', drawX, y + 52);
      drawX += ctx.measureText(' 爆出 ').width;
    } else {
      // "投喂 " 白色半透明
      ctx.fillStyle = '#ffffff';
      ctx.font = '15px -apple-system, "PingFang SC", sans-serif';
      ctx.fillText(action + ' ', drawX, y + 52);
      drawX += ctx.measureText(action + ' ').width;
    }
    // 礼物名 金色
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 16px -apple-system, "PingFang SC", sans-serif';
    ctx.fillText(giftName, drawX, y + 52);

    // ── 5. 右侧: 礼物图片(左) + "x N"(右) ──
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    const gSize = 72;
    const rightStart = W * 0.6;

    // 礼物图片左对齐
    if (giftImgObjs[i]) {
      ctx.drawImage(giftImgObjs[i], rightStart, y + (CARD_H - gSize) / 2, gSize, gSize);
    }

    // "x N" 在图片右边
    const numY = y + CARD_H * 0.5 + 11;
    const numStartX = rightStart + gSize + 8;

    // "x" 普通粗细
    ctx.font = 'italic 800 30px "Baloo 2", -apple-system, sans-serif';
    ctx.strokeStyle = '#bc6e2d';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.strokeText('x ', numStartX, numY);
    ctx.fillStyle = '#fff505';
    ctx.fillText('x ', numStartX, numY);
    const xW = ctx.measureText('x ').width;

    // 数字更粗（多次填充模拟加粗）
    ctx.font = 'italic 800 30px "Baloo 2", -apple-system, sans-serif';
    ctx.lineWidth = 5;
    ctx.strokeText(String(num), numStartX + xW, numY);
    ctx.fillStyle = '#fff505';
    ctx.fillText(String(num), numStartX + xW, numY);
    ctx.fillText(String(num), numStartX + xW + 0.5, numY);
    ctx.fillText(String(num), numStartX + xW - 0.5, numY);
  }

  document.getElementById('giftCanvas').style.display = '';
  document.getElementById('gifPreview').style.display = 'none';
  document.getElementById('imgTitle').textContent = `${u.user_name} - ${data.date} 礼物`;
  document.getElementById('imgModal').classList.add('show');
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function downloadGiftImage() {
  const canvas = document.getElementById('giftCanvas');
  const gifPreview = document.getElementById('gifPreview');
  const a = document.createElement('a');
  if (gifPreview.style.display !== 'none') {

  }
  a.click();
}

const gifCache = {};
async function checkGiftGifs() {
  document.querySelectorAll('.gen-gif-btn[data-gift-id]').forEach(async (btn) => {
    const gid = btn.dataset.giftId;
    if (gifCache[gid] !== undefined) {
      if (gifCache[gid]) btn.style.display = '';
      return;
    }
    try {
      const res = await fetch(`/api/gift-gif?gift_id=${gid}`);
      const d = await res.json();
      gifCache[gid] = d.gif || '';
      if (d.gif) btn.style.display = '';
    } catch(e) {}
  });
}

      const d = await res.json();
      alert(d.error || '生成失败');
      document.getElementById('imgModal').classList.remove('show');

    alert('生成失败');
    document.getElementById('imgModal').classList.remove('show');
